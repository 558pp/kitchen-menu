<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>私人厨房 · 菜品大全</title>
<style>
:root{
  --red:#e8532e;--red-light:#f07b4b;--bg:#fef9f4;--card:#fff;--text:#3d2c1e;
  --text-light:#999;--border:#f0e6db;--shadow:0 2px 12px rgba(0,0,0,.06);
  --shadow-hover:0 6px 24px rgba(0,0,0,.1);--radius:16px;
  --gold:#f5a623;--green:#2e8540;--blue:#3b82f6;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Header */
.header{background:linear-gradient(135deg,#c0392b,#e8532e);color:#fff;text-align:center;padding:28px 16px 20px;position:relative}
.header::after{content:"";position:absolute;bottom:-18px;left:-5%;width:110%;height:36px;background:var(--bg);border-radius:50% 50% 0 0}
.header h1{font-size:28px;letter-spacing:3px;margin-bottom:2px;text-shadow:0 2px 4px rgba(0,0,0,.15)}
.header .motto{font-size:13px;opacity:.85;margin-top:4px;font-style:italic}

/* Stats Bar */
.stats-bar{display:flex;justify-content:center;gap:16px;padding:20px 16px 8px;flex-wrap:wrap;position:relative;z-index:1}
.stat-card{background:var(--card);border-radius:var(--radius);padding:14px 20px;box-shadow:var(--shadow);text-align:center;min-width:90px;transition:.2s}
.stat-card:active{transform:scale(.96)}
.stat-val{font-size:26px;font-weight:800;color:var(--red);line-height:1.2}
.stat-lbl{font-size:11px;color:var(--text-light);margin-top:2px}

/* Filter Bar */
.filter-bar{padding:12px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:10;background:var(--bg);padding-bottom:8px}
.search-box{flex:1;min-width:160px;position:relative}
.search-box input{width:100%;padding:10px 12px 10px 36px;border:2px solid var(--border);border-radius:25px;font-size:14px;background:var(--card);color:var(--text);outline:none;transition:.2s;font-family:inherit}
.search-box input:focus{border-color:var(--red-light)}
.search-box .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.filter-tabs{display:flex;gap:6px;overflow-x:auto;padding:4px 0;scrollbar-width:none}
.filter-tabs::-webkit-scrollbar{display:none}
.filter-tab{padding:7px 16px;border-radius:20px;font-size:13px;border:1.5px solid var(--border);background:var(--card);color:var(--text);white-space:nowrap;cursor:pointer;transition:.2s;font-family:inherit;font-weight:500}
.filter-tab.active{background:var(--red);color:#fff;border-color:var(--red)}
.filter-tab:active{transform:scale(.95)}
.sort-btn{padding:7px 12px;border-radius:20px;font-size:12px;border:1.5px dashed var(--border);background:var(--card);color:var(--text-light);cursor:pointer;white-space:nowrap;font-family:inherit;transition:.2s}
.sort-btn.active{background:var(--gold);color:#fff;border-color:var(--gold);border-style:solid}

/* Section */
.section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px}
.section-title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.section-count{font-size:12px;background:var(--red-light);color:#fff;padding:2px 10px;border-radius:12px;font-weight:500}
.section-sub{font-size:12px;color:var(--text-light)}

/* Menu Grid */
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:0 16px 16px}
@media(max-width:480px){.menu-grid{grid-template-columns:1fr}}

/* Card */
.card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);transition:all .25s;position:relative;overflow:hidden;border:1px solid transparent;cursor:default}
.card.dragging{opacity:.4;transform:scale(.96);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card.drag-over{border-color:var(--red);border-style:dashed;box-shadow:0 0 0 2px rgba(232,83,46,.2)}
.card:hover{border-color:var(--red-light);box-shadow:var(--shadow-hover)}
.card.rated{border-left:4px solid var(--gold)}
.card.new{border-left:4px solid var(--blue)}
.card-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.card-icon{font-size:40px;line-height:1;flex-shrink:0;transition:.2s}
.card:hover .card-icon{transform:scale(1.1)}
.card-body{flex:1;min-width:0}
.card-name{font-size:18px;font-weight:700;color:var(--text);line-height:1.3}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.badge{font-size:10px;padding:3px 10px;border-radius:10px;font-weight:600;white-space:nowrap}
.badge-spice{background:#fff0ed;color:#e8532e;border:1px solid #fdd4c4}
.badge-level{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.badge-time{background:#f0f7ff;color:#3b82b6;border:1px solid #d0e5ff}
.badge-done{background:#edf7f0;color:var(--green);border:1px solid #c8e6c9}
.badge-new{background:#fef3ff;color:#a855f7;border:1px solid #e9d5ff}

/* Stars */
.stars-row{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.stars{font-size:26px;cursor:pointer;user-select:none;letter-spacing:2px;line-height:1}
.stars span{color:#e0e0e0;transition:all .15s;display:inline-block}
.stars span.active{color:var(--gold)}
.stars span:hover{transform:scale(1.25)}
.stars span:active{transform:scale(.9)}
.rating-text{font-size:12px;color:var(--text-light);margin-left:4px}

.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.card-note{font-size:12px;color:#aaa;font-style:italic;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-date{font-size:10px;color:#ccc;flex-shrink:0;margin-left:8px}

/* Action buttons */
.card-actions{display:flex;gap:6px;margin-top:10px;padding-top:8px;border-top:1px dashed var(--border)}
.card-actions button{font-size:11px;padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text-light);cursor:pointer;font-family:inherit;transition:.2s}
.card-actions button:hover{background:var(--red);color:#fff;border-color:var(--red)}
.card-actions button.danger:hover{background:#e74c3c}

/* Drag handle */
.drag-handle{position:absolute;top:10px;right:12px;cursor:grab;user-select:none;font-size:18px;color:#ccc;z-index:5;padding:4px 8px;border-radius:6px;transition:.2s;line-height:1;touch-action:none}
.drag-handle:hover{color:var(--text-light);background:var(--border)}
.drag-handle:active{cursor:grabbing}
.card.dragging .drag-handle{cursor:grabbing;color:var(--red)}

/* Add Button */
.add-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--red);color:#fff;font-size:28px;border:0;box-shadow:0 4px 16px rgba(232,83,46,.4);cursor:pointer;z-index:20;transition:.25s;display:flex;align-items:center;justify-content:center}
.add-fab:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(232,83,46,.5)}
.add-fab:active{transform:scale(.95)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:24px 20px 32px;animation:slideUp .3s}
.modal h3{font-size:18px;margin-bottom:16px;text-align:center}
.modal .field{margin-bottom:12px}
.modal label{display:block;font-size:12px;color:var(--text-light);margin-bottom:4px;font-weight:600}
.modal input,.modal select,.modal textarea{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:12px;font-size:14px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;transition:.2s}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--red-light)}
.modal textarea{resize:none;height:60px}
.modal .btn-row{display:flex;gap:10px;margin-top:16px}
.modal .btn{flex:1;padding:12px;border-radius:12px;font-size:15px;font-weight:600;border:0;cursor:pointer;font-family:inherit;transition:.2s}
.modal .btn-save{background:var(--red);color:#fff}
.modal .btn-save:active{background:#c0392b}
.modal .btn-cancel{background:#f5f5f5;color:#666}
.modal .btn-delete{background:#fff;color:#e74c3c;border:1px solid #e74c3c;flex:0}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:#ccc}
.empty .icon{font-size:64px;margin-bottom:12px}
.empty p{font-size:14px;margin-bottom:4px}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:25px;font-size:14px;z-index:50;animation:toastIn .3s;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

/* Footer */
.footer{text-align:center;padding:32px 16px 80px;color:#ccc;font-size:12px}
.footer .heart{color:var(--red)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes toastIn{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.35)}100%{transform:scale(1)}}
.pop{animation:pop .4s ease}

@media(max-width:480px){
  .menu-grid{grid-template-columns:1fr}
  .stats-bar{gap:8px}
  .stat-card{padding:10px 14px;min-width:70px}
  .stat-val{font-size:22px}
  .header h1{font-size:22px}
  .filter-tab{padding:6px 12px;font-size:12px}
}
</style>
</head>
<body>

<div class="header">
  <h1>🍳 私人厨房</h1>
  <div class="motto">每一道菜 · 都是为你做的</div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat-card"><div class="stat-val" id="sTotal">0</div><div class="stat-lbl">菜品总数</div></div>
  <div class="stat-card"><div class="stat-val" id="sRated">0</div><div class="stat-lbl">已评价</div></div>
  <div class="stat-card"><div class="stat-val" id="sAvg">—</div><div class="stat-lbl">小易均分</div></div>
  <div class="stat-card"><div class="stat-val" id="sTop">—</div><div class="stat-lbl">最高评价</div></div>
  <div class="stat-card"><div class="stat-val" id="sCooked">0</div><div class="stat-lbl">做菜次数</div></div>
</div>

<div class="filter-bar">
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索菜名…" oninput="filterAndRender()">
  </div>
  <button class="sort-btn" id="sortBtn" onclick="toggleSort()">⭐ 评分排序</button>
  <button class="sort-btn" id="customSortBtn" onclick="toggleCustomSort()" style="border-style:solid;border-color:var(--border);background:var(--red);color:#fff;font-weight:600">🖐 自由排序</button>
</div>

<div class="filter-tabs" id="filterTabs">
  <button class="filter-tab active" onclick="setFilter('all', this)">全部</button>
  <button class="filter-tab" onclick="setFilter('🥩', this)">🥩 猪肉</button>
  <button class="filter-tab" onclick="setFilter('🍗', this)">🍗 鸡翅</button>
  <button class="filter-tab" onclick="setFilter('🥬', this)">🥬 蔬菜</button>
  <button class="filter-tab" onclick="setFilter('🥚', this)">🥚 蛋类</button>
  <button class="filter-tab" onclick="setFilter('rated', this)">⭐ 已评价</button>
  <button class="filter-tab" onclick="setFilter('done', this)">✅ 已做</button>
  <button class="filter-tab" onclick="setFilter('todo', this)">📋 待做</button>
</div>

<div class="section-header">
  <div class="section-title" id="sectionLabel">📋 全部菜品 <span class="section-count" id="visibleCount">0</span></div>
  <div class="section-sub" id="sectionSub"></div>
</div>

<div class="menu-grid" id="menuGrid"></div>

<button class="add-fab" onclick="openAddModal()" title="添加新菜">＋</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <h3 id="modalTitle">✨ 添加新菜</h3>
    <div class="field"><label>菜名 *</label><input id="fName" placeholder="如：糖醋排骨" maxlength="20"></div>
    <div class="field" style="display:flex;gap:8px">
      <div style="flex:1"><label>分类</label><select id="fCat">
        <option value="🥩">🥩 猪肉</option><option value="🍗">🍗 鸡翅</option><option value="🥬">🥬 蔬菜</option>
        <option value="🥚">🥚 蛋类</option><option value="🍚">🍚 主食</option><option value="🥘">🥘 其他</option>
      </select></div>
      <div style="flex:1"><label>辣度</label><select id="fSpice">
        <option value="">不辣 😋</option><option value="🌶️">微辣 🌶️</option><option value="🌶️🌶️">中辣 🌶️🌶️</option><option value="🌶️🌶️🌶️">特辣 🌶️🌶️🌶️</option>
      </select></div>
    </div>
    <div class="field" style="display:flex;gap:8px">
      <div style="flex:1"><label>难度</label><select id="fDiff">
        <option value="⭐">⭐ 简单</option><option value="⭐⭐">⭐⭐ 中等</option><option value="⭐⭐⭐">⭐⭐⭐ 复杂</option>
      </select></div>
      <div style="flex:1"><label>耗时</label><select id="fTime">
        <option value="15分钟">⚡ 15分钟</option><option value="30分钟">🕐 30分钟</option><option value="45分钟">🕑 45分钟</option><option value="1小时">🕒 1小时</option><option value="1小时+">🕓 1小时+</option>
      </select></div>
    </div>
    <div class="field"><label>备注</label><input id="fNote" placeholder="小易的评价、做菜心得…" maxlength="50"></div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-save" id="btnSave" onclick="saveDish()">💾 保存</button>
    </div>
    <div class="btn-row" id="btnDeleteRow" style="display:none">
      <button class="btn btn-delete" onclick="deleteDish()">🗑️ 删除这道菜</button>
    </div>
  </div>
</div>

<div class="footer">❤️ 用心做好每一顿饭 · <span class="heart">小易专属厨房</span></div>

<script>
const KEY = "private_kitchen_v2";
const ICONS = {"🥩":"🥩","🍗":"🍗","🥬":"🥬","🥚":"🥚","🍚":"🍚","🥘":"🍲"};

const PRESETS = [
  {id:"p1",name:"糖醋排骨",cat:"🥩",spice:"",diff:"⭐⭐",time:"1小时",tags:["done"],note:"第一次做就成功了！",date:"2026-06-29"},
  {id:"p2",name:"可乐鸡翅",cat:"🍗",spice:"",diff:"⭐",time:"30分钟",tags:["done"],note:"比外面卖的还好吃",date:"2026-06-30"},
  {id:"p3",name:"辣椒炒肉",cat:"🥩",spice:"🌶️🌶️",diff:"⭐",time:"15分钟",tags:[],note:"",date:""},
  {id:"p4",name:"水煮肉片",cat:"🥩",spice:"🌶️🌶️🌶️",diff:"⭐⭐",time:"45分钟",tags:[],note:"",date:""},
  {id:"p5",name:"回锅肉",cat:"🥩",spice:"🌶️🌶️",diff:"⭐⭐",time:"30分钟",tags:[],note:"空心菜梗替代蒜苗",date:""},
  {id:"p6",name:"孜然猪肉片",cat:"🥩",spice:"🌶️",diff:"⭐",time:"20分钟",tags:[],note:"烧烤摊的味道",date:""},
  {id:"p7",name:"干锅排骨",cat:"🥩",spice:"🌶️🌶️",diff:"⭐⭐",time:"45分钟",tags:[],note:"",date:""},
  {id:"p8",name:"煎猪扒",cat:"🥩",spice:"",diff:"⭐",time:"20分钟",tags:[],note:"黑椒/香辣两种口味",date:""},
  {id:"p9",name:"锅包肉",cat:"🥩",spice:"",diff:"⭐⭐⭐",time:"1小时",tags:[],note:"东北名菜",date:""},
  {id:"p10",name:"蒜泥白肉",cat:"🥩",spice:"🌶️🌶️",diff:"⭐",time:"30分钟",tags:[],note:"凉菜，不用开火",date:""},
  {id:"p11",name:"盐煎鸡翅",cat:"🍗",spice:"",diff:"⭐",time:"15分钟",tags:[],note:"只放盐，原味焦香",date:""},
  {id:"p12",name:"蒜香黄油鸡翅",cat:"🍗",spice:"",diff:"⭐",time:"25分钟",tags:[],note:"",date:""},
  {id:"p13",name:"蜜汁鸡翅",cat:"🍗",spice:"🌶️",diff:"⭐",time:"35分钟",tags:[],note:"甜辣亮晶晶",date:""},
  {id:"p14",name:"辣子鸡翅",cat:"🍗",spice:"🌶️🌶️",diff:"⭐⭐",time:"25分钟",tags:[],note:"",date:""},
  {id:"p15",name:"麻辣啤酒鸡翅",cat:"🍗",spice:"🌶️🌶️",diff:"⭐",time:"30分钟",tags:[],note:"",date:""},
  {id:"p16",name:"椒盐鸡翅",cat:"🍗",spice:"🌶️",diff:"⭐⭐",time:"20分钟",tags:[],note:"夜市酥脆风",date:""},
  {id:"p17",name:"柠檬黑椒鸡翅",cat:"🍗",spice:"🌶️",diff:"⭐",time:"25分钟",tags:[],note:"清爽夏日",date:""},
  {id:"p18",name:"腐乳鸡翅",cat:"🍗",spice:"",diff:"⭐",time:"30分钟",tags:[],note:"粤式咸香",date:""},
  {id:"p19",name:"咖喱鸡翅",cat:"🍗",spice:"",diff:"⭐",time:"30分钟",tags:[],note:"拌饭神器",date:""},
  {id:"p20",name:"剁椒蒸鸡翅",cat:"🍗",spice:"🌶️🌶️",diff:"⭐",time:"30分钟",tags:[],note:"电饭煲一键搞定",date:""},
  {id:"p21",name:"红烧鸡翅",cat:"🍗",spice:"",diff:"⭐",time:"30分钟",tags:[],note:"",date:""},
  {id:"p22",name:"番茄鸡翅",cat:"🍗",spice:"",diff:"⭐",time:"30分钟",tags:[],note:"酸甜开胃",date:""},
  {id:"p23",name:"沙茶鸡翅",cat:"🍗",spice:"",diff:"⭐",time:"30分钟",tags:[],note:"潮汕风味",date:""},
  {id:"p24",name:"电饭煲焖鸡翅",cat:"🍗",spice:"🌶️",diff:"⭐",time:"30分钟",tags:[],note:"懒人一键出",date:""},
  {id:"p25",name:"黄焖鸡",cat:"🍗",spice:"",diff:"⭐⭐",time:"45分钟",tags:[],note:"一锅出",date:""},
  {id:"p26",name:"蒜蓉空心菜",cat:"🥬",spice:"",diff:"⭐",time:"15分钟",tags:[],note:"解辣神器",date:""},
  {id:"p27",name:"酸辣土豆丝",cat:"🥬",spice:"🌶️",diff:"⭐",time:"15分钟",tags:[],note:"",date:""},
  {id:"p28",name:"西红柿炒鸡蛋",cat:"🥚",spice:"",diff:"⭐",time:"15分钟",tags:[],note:"国民菜",date:""},
  {id:"p29",name:"小炒黄牛肉",cat:"🥩",spice:"🌶️🌶️🌶️",diff:"⭐⭐",time:"15分钟",tags:[],note:"猛火快炒",date:""},
];

let dishes=[], filter="all", sortBy="default", editId=null;

function load(){
  try{const d=localStorage.getItem(KEY);if(d){dishes=JSON.parse(d);return}}catch(e){}
  dishes=PRESETS.map(d=>({...d,stars:0}));save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(dishes))}

function toast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1800);
}

function setFilter(f,el){
  filter=f;document.querySelectorAll(".filter-tab").forEach(b=>b.classList.remove("active"));
  if(el)el.classList.add("active");filterAndRender();
}

function toggleSort(){
  sortBy=sortBy==="default"?"stars":"default";
  const b=document.getElementById("sortBtn");
  b.textContent=sortBy==="stars"?"⭐ 评分中":"⭐ 评分排序";
  b.classList.toggle("active",sortBy==="stars");
  filterAndRender();
}

function filterAndRender(){
  let list=[...dishes];
  const q=document.getElementById("searchInput").value.trim().toLowerCase();
  if(q)list=list.filter(d=>d.name.toLowerCase().includes(q));
  if(filter==="rated")list=list.filter(d=>d.stars>0);
  else if(filter==="done")list=list.filter(d=>d.tags&&d.tags.includes("done"));
  else if(filter==="todo")list=list.filter(d=>!(d.tags&&d.tags.includes("done")));
  else if(filter!=="all")list=list.filter(d=>d.cat===filter);
  if(sortBy==="stars")list.sort((a,b)=>(b.stars||0)-(a.stars||0));
  render(list);
  const lbl=filter==="all"?"全部菜品":filter==="rated"?"已评价":filter==="done"?"已做":"分类";
  document.getElementById("sectionLabel").innerHTML=lbl+' <span class="section-count">'+list.length+'道</span>';
  document.getElementById("visibleCount").textContent=list.length;
}

function rate(id,stars){
  const d=dishes.find(x=>x.id===id);if(!d)return;
  d.stars=d.stars===stars?0:stars;save();filterAndRender();updateStats();
}

function toggleDone(id){
  const d=dishes.find(x=>x.id===id);if(!d)return;
  if(!d.tags)d.tags=[];
  const idx=d.tags.indexOf("done");
  if(idx>=0){d.tags.splice(idx,1);d.date="";toast("已标记为「待做」")}
  else{
    d.tags.push("done");
    d.date=d.date||new Date().toISOString().slice(0,10);
    toast("✅ 已标记为「已做」！")
  }
  save();filterAndRender();updateStats();
}

function openAddModal(){
  editId=null;
  document.getElementById("modalTitle").textContent="✨ 添加新菜";
  document.getElementById("btnDeleteRow").style.display="none";
  clearForm();document.getElementById("modal").style.display="flex";
  setTimeout(()=>document.getElementById("fName").focus(),100);
}
function openEditModal(id){
  editId=id;const d=dishes.find(x=>x.id===id);if(!d)return;
  document.getElementById("modalTitle").textContent="✏️ 编辑菜品";
  document.getElementById("btnDeleteRow").style.display="flex";
  document.getElementById("fName").value=d.name;
  document.getElementById("fCat").value=d.cat||"🥩";
  document.getElementById("fSpice").value=d.spice||"";
  document.getElementById("fDiff").value=d.diff||"⭐";
  document.getElementById("fTime").value=d.time||"30分钟";
  document.getElementById("fNote").value=d.note||"";
  document.getElementById("modal").style.display="flex";
}
function clearForm(){
  document.getElementById("fName").value="";
  document.getElementById("fCat").value="🥩";
  document.getElementById("fSpice").value="";
  document.getElementById("fDiff").value="⭐";
  document.getElementById("fTime").value="30分钟";
  document.getElementById("fNote").value="";
}
function closeModal(){document.getElementById("modal").style.display="none";editId=null}

function saveDish(){
  const name=document.getElementById("fName").value.trim();
  if(!name){toast("请输入菜名～");return}
  const d={
    name,
    cat:document.getElementById("fCat").value,
    spice:document.getElementById("fSpice").value,
    diff:document.getElementById("fDiff").value,
    time:document.getElementById("fTime").value,
    note:document.getElementById("fNote").value.trim(),
  };
  if(editId){
    const old=dishes.find(x=>x.id===editId);
    if(old){Object.assign(old,d);toast("✅ 已更新")}
  }else{
    d.id="d"+Date.now();d.stars=0;d.tags=[];d.date="";
    dishes.push(d);toast("🎉 新菜已添加")
  }
  save();closeModal();filterAndRender();updateStats();
}
function deleteDish(){
  if(!editId)return;
  if(!confirm("确定要删除这道菜吗？"))return;
  dishes=dishes.filter(x=>x.id!==editId);
  save();closeModal();filterAndRender();updateStats();
  toast("🗑️ 已删除");
}

function updateStats(){
  const rated=dishes.filter(d=>d.stars>0);
  const done=dishes.filter(d=>d.tags&&d.tags.includes("done"));
  document.getElementById("sTotal").textContent=dishes.length;
  document.getElementById("sRated").textContent=rated.length;
  document.getElementById("sCooked").textContent=done.length;
  if(rated.length){
    document.getElementById("sAvg").textContent=(rated.reduce((s,d)=>s+d.stars,0)/rated.length).toFixed(1);
    document.getElementById("sTop").textContent=rated.reduce((a,b)=>a.stars>=b.stars?a:b).name+" ⭐"+rated.reduce((a,b)=>a.stars>=b.stars?a:b).stars;
  }else{document.getElementById("sAvg").textContent="—";document.getElementById("sTop").textContent="—"}
}

function renderCard(d, idx){
  const stars=d.stars||0,isDone=d.tags&&d.tags.includes("done"),hasNote=!!d.note;
  let s="";for(let i=1;i<=5;i++)s+=`<span class="${i<=stars?'active':''}" data-s="${i}">★</span>`;
  const spice=d.spice?`<span class="badge badge-spice">${d.spice}</span>`:"";
  const diff=`<span class="badge badge-level">${d.diff||'⭐'}</span>`;
  const time=`<span class="badge badge-time">${d.time||'?'}</span>`;
  const done=isDone?`<span class="badge badge-done">✅ 已做</span>`:"";
  const note=hasNote?`<div class="card-note">📝 ${d.note}</div>`:"";
  const date=isDone&&d.date?`<div class="card-date">${d.date}</div>`:"";
  const ratingText=stars>0?`小易：${'⭐'.repeat(stars)}`:"小易还没打分～";
  const ratedClass=(stars>0?" rated":"");

  return `<div class="card${ratedClass}" data-id="${d.id}" data-idx="${idx}" draggable="true">
    <span class="drag-handle" title="拖拽排序">⠿</span>
    <div class="card-header">
      <div class="card-icon">${ICONS[d.cat]||'🍽️'}</div>
      <div class="card-body">
        <div class="card-name">${d.name}</div>
        <div class="card-meta">${done}${spice}${diff}${time}</div>
      </div>
    </div>
    <div class="stars-row">
      <div class="stars" onclick="rate('${d.id}',parseInt(event.target.dataset.s));event.stopPropagation()">${s}</div>
      <span class="rating-text">${ratingText}</span>
    </div>
    <div class="card-footer">${note}${date}</div>
    <div class="card-actions">
      <button onclick="toggleDone('${d.id}');event.stopPropagation()">${isDone?'↩️ 撤回':'✅ 标记已做'}</button>
      <button onclick="openEditModal('${d.id}');event.stopPropagation()" style="margin-left:auto">✏️ 编辑</button>
    </div>
  </div>`;
}

function render(list){
  const grid=document.getElementById("menuGrid");
  if(!list.length){
    grid.innerHTML=`<div class="empty"><div class="icon">🍳</div><p>还没有菜品</p><p style="font-size:12px">快去厨房大显身手吧！</p></div>`;
  }else{grid.innerHTML=list.map((d,i)=>renderCard(d,i)).join("");bindDragEvents()}
}

// ========== DRAG & DROP ==========
let dragSrcId=null, dragSrcIdx=null, isCustomSort=true;

function toggleCustomSort(){
  isCustomSort=true;
  sortBy="default";
  document.getElementById("sortBtn").classList.remove("active");
  document.getElementById("sortBtn").textContent="⭐ 评分排序";
  const cb=document.getElementById("customSortBtn");
  cb.style.background="var(--red)";cb.style.color="#fff";cb.style.fontWeight="600";
  toast("🖐 自由排序模式：拽卡片右边的⠿手柄");
  // reset filter to all for intuitive drag
  if(filter!=="all"){filter="all";document.querySelectorAll(".filter-tab").forEach((b,i)=>b.classList.toggle("active",i===0))}
  filterAndRender();
}

function bindDragEvents(){
  const cards=document.querySelectorAll(".card");
  cards.forEach(card=>{
    card.addEventListener("dragstart",onDragStart);
    card.addEventListener("dragover",onDragOver);
    card.addEventListener("dragleave",onDragLeave);
    card.addEventListener("drop",onDrop);
    card.addEventListener("dragend",onDragEnd);
    // Touch support on drag handle
    const handle=card.querySelector(".drag-handle");
    if(handle){handle.addEventListener("touchstart",onTouchStart,{passive:false});handle.addEventListener("touchmove",onTouchMove,{passive:false});handle.addEventListener("touchend",onTouchEnd)}
  });
}

function onDragStart(e){
  if(e.target.closest("button")||e.target.closest(".stars")){e.preventDefault();return}
  dragSrcId=this.dataset.id;
  dragSrcIdx=parseInt(this.dataset.idx);
  this.classList.add("dragging");
  e.dataTransfer.effectAllowed="move";
  e.dataTransfer.setData("text/plain",dragSrcId);
  setTimeout(()=>{if(this.classList.contains("dragging"))this.style.opacity="0.4"},0);
}

function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect="move";
  if(this.dataset.id===dragSrcId)return;
  this.classList.add("drag-over");
}

function onDragLeave(e){this.classList.remove("drag-over")}

function onDrop(e){
  e.preventDefault();
  this.classList.remove("drag-over");
  const targetId=this.dataset.id;
  if(!dragSrcId||dragSrcId===targetId)return;
  // Reorder dishes array
  const fromIdx=dishes.findIndex(d=>d.id===dragSrcId);
  const toIdx=dishes.findIndex(d=>d.id===targetId);
  if(fromIdx<0||toIdx<0)return;
  const [moved]=dishes.splice(fromIdx,1);
  dishes.splice(toIdx,0,moved);
  save();
  // Exit stars sort if active
  if(sortBy==="stars"){sortBy="default";document.getElementById("sortBtn").classList.remove("active");document.getElementById("sortBtn").textContent="⭐ 评分排序"}
  isCustomSort=true;
  filterAndRender();
  updateStats();
}

function onDragEnd(e){
  this.classList.remove("dragging");
  this.style.opacity="";
  document.querySelectorAll(".card.drag-over").forEach(c=>c.classList.remove("drag-over"));
  dragSrcId=null;dragSrcIdx=null;
}

// Touch-based drag
let touchClone=null,touchStartY=0,touchCard=null;
function onTouchStart(e){
  e.preventDefault();
  const card=e.target.closest(".card");
  if(!card)return;
  touchCard=card;
  dragSrcId=card.dataset.id;
  dragSrcIdx=parseInt(card.dataset.idx);
  touchStartY=e.touches[0].clientY;
  card.classList.add("dragging");
  // Create clone
  touchClone=card.cloneNode(true);
  touchClone.style.position="fixed";
  touchClone.style.zIndex="100";
  touchClone.style.width=card.offsetWidth+"px";
  touchClone.style.opacity="0.85";
  touchClone.style.transform="rotate(2deg)";
  touchClone.style.pointerEvents="none";
  touchClone.style.left=e.touches[0].clientX-card.offsetWidth/2+"px";
  touchClone.style.top=(e.touches[0].clientY-30)+"px";
  document.body.appendChild(touchClone);
}

function onTouchMove(e){
  e.preventDefault();
  if(!touchClone){touchClone?.remove();touchClone=null;return}
  touchClone.style.left=(e.touches[0].clientX-touchClone.offsetWidth/2)+"px";
  touchClone.style.top=(e.touches[0].clientY-30)+"px";
  // Highlight target
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("drag-over"));
  const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
  const target=el?.closest(".card");
  if(target&&target.dataset.id!==dragSrcId)target.classList.add("drag-over");
}

function onTouchEnd(e){
  e.preventDefault();
  if(touchClone){touchClone.remove();touchClone=null}
  if(!touchCard){return}
  touchCard.classList.remove("dragging");
  document.querySelectorAll(".card.drag-over").forEach(c=>c.classList.remove("drag-over"));
  // Find target
  const el=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
  const target=el?.closest(".card");
  if(target&&target.dataset.id!==dragSrcId){
    const fromIdx=dishes.findIndex(d=>d.id===dragSrcId);
    const toIdx=dishes.findIndex(d=>d.id===target.dataset.id);
    if(fromIdx>=0&&toIdx>=0){
      const [moved]=dishes.splice(fromIdx,1);
      dishes.splice(toIdx,0,moved);
      save();
      if(sortBy==="stars"){sortBy="default";document.getElementById("sortBtn").classList.remove("active");document.getElementById("sortBtn").textContent="⭐ 评分排序"}
      isCustomSort=true;
      filterAndRender();
      updateStats();
    }
  }
  dragSrcId=null;dragSrcIdx=null;touchCard=null;
}

function updateStatsDebounced(){updateStats();filterAndRender()}
load();filterAndRender();updateStats();

// Close modal on overlay click
document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)closeModal()});
</script>
